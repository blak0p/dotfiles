shell_integration enabled
font_family      JetBrainsMonoNL Nerd Font
bold_font        JetBrainsMonoNL Nerd Font
italic_font      JetBrainsMonoNL Nerd Font
bold_italic_font JetBrainsMonoNL Nerd Font
font_size        12.0

background_opacity 0.65
dynamic_background_opacity yes

window_padding_width 8
hide_window_decorations no
confirm_os_window_close 0

enable_audio_bell no
visual_bell_duration 0.0

tab_bar_style powerline
tab_bar_edge top
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_separator ""

shell fish

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

map ctrl+shift+enter new_window
map ctrl+shift+t new_tab
map ctrl+shift+q close_window
map ctrl+shift+w close_tab

map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

foreground #d7d0cd
background #18181a
selection_foreground #18181a
selection_background #d7d0cd
cursor #d7d0cd
cursor_text_color #18181a

color0 #18181a
color8 #76747a
color1 #c84040
color9 #e16c6c
color2 #97c381
color10 #b3d99a
color3 #e3c78a
color11 #f0dfb0
color4 #80b4d6
color12 #9eceeb
color5 #A882C2
color13 #c6a5d9
color6 #7bc1b7
color14 #a1d4cc
color7 #d7d0cd
color15 #ece6e2
