# yaml-language-server: $schema=https://gh-dash.dev/schema.json
# =============================================================================
# gh-dash config — blak0p
# =============================================================================

# ── PR Sections ──────────────────────────────────────────────────────────────
prSections:
  - title: "\U0001F477 My PRs"
    filters: is:open author:@me sort:updated-desc
  - title: "\U0001F50D Needs Review"
    filters: is:open review-requested:@me sort:updated-desc
  - title: "\U0001F91D Involved"
    filters: is:open involves:@me -author:@me sort:updated-desc
  - title: "\U0001F4CC Drafts"
    filters: is:open author:@me draft:true
  - title: "\U0001F3AF Recent (7d)"
    filters: >-
      is:open involves:@me
      updated:>={{ nowModify "-7d" }}
      sort:updated-desc
    limit: 30

# ── Issue Sections ───────────────────────────────────────────────────────────
issuesSections:
  - title: "\U0001F4DD My Issues"
    filters: is:open author:@me sort:updated-desc
  - title: "\U0001F3F7 Assigned"
    filters: is:open assignee:@me sort:updated-desc
  - title: "\U0001F91D Involved"
    filters: is:open involves:@me -author:@me sort:updated-desc

# ── Notification Sections ────────────────────────────────────────────────────
notificationsSections:
  - title: "\U0001F514 All"
    filters: ""
  - title: "\U0000270F Created"
    filters: reason:author
  - title: "\U0001F4AC Participating"
    filters: reason:participating
  - title: "\U0001F4E2 Mentioned"
    filters: reason:mention
  - title: "\U0001F50D Review Requested"
    filters: reason:review-requested
  - title: "\U0001F3F7 Assigned"
    filters: reason:assign
  - title: "\U0001F516 Subscribed"
    filters: reason:subscribed

# ── Repo Paths ───────────────────────────────────────────────────────────────
# Mapea blak0p/* a tus repos locales para poder checkoutear PRs.
# Desde el container distrobox usa /run/host/... que es la ruta real.
repoPaths:
  blak0p/*: /run/host/home/alejandro/dev/*

# ── Custom Keybindings ───────────────────────────────────────────────────────
keybindings:
  # ── Universales (funcionan en cualquier vista) ────────────────────────
  universal:
    - key: g
      name: "\U0001F9BE lazygit"
      command: >-
        cd {{.RepoPath}} && lazygit

    - key: G
      name: "\U0001F30D open in browser"
      builtin: openGithub

    - key: r
      name: "\U0001F504 refresh section"
      builtin: refresh

    - key: R
      name: "\U0001F504 refresh all"
      builtin: refreshAll

    - key: /
      name: "\U0001F50D search"
      builtin: search

    - key: y
      name: "\U0001F4CB copy URL"
      builtin: copyurl

    - key: Y
      name: "\U0001F522 copy number"
      builtin: copyNumber

    - key: "?"
      name: "\U00002753 help"
      builtin: help

    - key: q
      name: "\U0001F6AA quit"
      builtin: quit

    - key: escape
      builtin: search

    - key: T
      name: "\U0001F4BF toggle preview"
      builtin: togglePreview

  # ── PR-specific ───────────────────────────────────────────────────────
  prs:
    - key: O
      name: "\U0001F4CB checkout PR"
      builtin: checkout

    - key: c
      name: "\U0001F4AC comment"
      builtin: comment

    - key: v
      name: "\U00002705 approve"
      builtin: approve

    - key: m
      name: "\U0001F500 merge"
      builtin: merge

    - key: M
      name: "\U0001F4A2 merge (admin)"
      command: >-
        gh pr merge --admin --repo {{.RepoName}} {{.PrNumber}}

    - key: d
      name: "\U0001F4CB diff"
      builtin: diff

    - key: x
      name: "\U0000274C close"
      builtin: close

    - key: X
      name: "\U0001F504 reopen"
      builtin: reopen

    - key: s
      name: "\U0001F4DC summary (more)"
      builtin: summaryViewMore

    - key: a
      name: "\U0001F464 assign"
      builtin: assign

    - key: u
      name: "\U0001F504 update branch"
      builtin: update

    - key: w
      name: "\U0001F6A8 watch checks"
      builtin: watchChecks

    - key: W
      name: "\U0000270F approve workflows"
      builtin: approveWorkflows

    - key: C
      name: "\U0001F916 AI review (opencode)"
      command: >-
        tmux new-window -c {{.RepoPath}} '
        opencode --prompt "Review PR {{.PrNumber}} in {{.RepoName}}. Run \`gh pr view {{.PrNumber}}\` and \`gh pr diff {{.PrNumber}}\` to analyze the changes. Focus on correctness, security, and edge cases."
        '

    - key: D
      name: "\U0001F4A2 create repo"
      command: >-
        sh -c '
        read -p "Repo name: " name;
        read -p "Description: " desc;
        gh repo create "$$name" --description "$$desc" --private --clone
        '

    - key: "\U0001F5D1"
      name: delete repo
      command: >-
        sh -c '
        echo "Deleting {{.RepoName}}...";
        read -p "Confirm repo name to delete: " confirm;
        if [ "$$confirm" = "{{.RepoName}}" ]; then
          gh repo delete {{.RepoName}} --yes;
        else
          echo "Name mismatch, aborting";
        fi
        '

    - key: f
      name: "\U0001F500 fork repo"
      command: >-
        gh repo fork {{.RepoName}} --clone=false

    - key: i
      name: "\U0001F4DD create issue"
      command: >-
        sh -c '
        read -p "Issue title: " title;
        gh issue create --repo {{.RepoName}} --title "$$title"
        '

  # ── Issue-specific ────────────────────────────────────────────────────
  issues:
    - key: o
      name: "\U0001F4DD open in nvim"
      command: >-
        tmux new-window -c {{.RepoPath}} '
        nvim -c "Octo issue edit {{.IssueNumber}}"
        '

    - key: c
      name: "\U0001F4AC comment"
      builtin: comment

    - key: x
      name: "\U0000274C close"
      builtin: close

    - key: X
      name: "\U0001F504 reopen"
      builtin: reopen

    - key: a
      name: "\U0001F464 assign"
      builtin: assign

    - key: l
      name: "\U0001F3F7 label"
      builtin: label

    - key: L
      name: "\U0001F517 checkout branch"
      builtin: checkout

  # ── Notifications ─────────────────────────────────────────────────────
  notifications:
    - key: v
      name: "\U0001F441 view"
      builtin: view

    - key: d
      name: "\U00002705 mark done"
      builtin: markAsDone

    - key: D
      name: "\U00002705 mark all done"
      builtin: markAllAsDone

    - key: r
      name: "\U0001F4D6 mark read"
      builtin: markAsRead

    - key: R
      name: "\U0001F4D6 mark all read"
      builtin: markAllAsRead

    - key: u
      name: "\U0001F514 unsubscribe"
      builtin: unsubscribe

    - key: b
      name: "\U0001F516 toggle bookmark"
      builtin: toggleBookmark

# ── Defaults ──────────────────────────────────────────────────────────────────
defaults:
  view: prs
  refetchIntervalMinutes: 15
  prsLimit: 30
  issuesLimit: 30
  notificationsLimit: 30
  preview:
    open: true
    width: 0.45
  layout:
    prs:
      updatedAt:
        width: 5
      repo:
        width: 15
      author:
        width: 12
      authorIcon:
        hidden: false
      labels:
        width: 15
        hidden: true
      assignees:
        width: 15
        hidden: true
      base:
        width: 10
        hidden: true
      lines:
        width: 8
    issues:
      updatedAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 15
        hidden: true

# ── Pager ─────────────────────────────────────────────────────────────────────
pager:
  diff: delta

# ── Theme (Tokyo Night Storm, combinado con tu Ghostty) ──────────────────────
theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: true
  colors:
    text:
      primary: "#c0caf5"
      secondary: "#a9b1d6"
      inverted: "#1a1b26"
      faint: "#565f89"
      warning: "#f7768e"
      success: "#9ece6a"
    background:
      selected: "#33467c"
    border:
      primary: "#565f89"
      secondary: "#7dcfff"
      faint: "#24283b"

# ── Misc ─────────────────────────────────────────────────────────────────────
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
