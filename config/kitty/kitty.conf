# --- FUENTES ---
bold_font        auto
italic_font      auto
font_size        11.0

# --- APARIENCIA (Cristal 0.7) ---
background_opacity 0.7
background_blur 1
dynamic_background_opacity yes
window_padding_width 15

# --- CURSOR ANIMADO (Incluso al escribir) ---
cursor_shape beam
# Umbral en 0 para que se anime letra a letra
cursor_trail_start_threshold 0
cursor_trail 5
cursor_trail_decay 0.1 0.2

# Parpadeo suave
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# --- RENDIMIENTO Y CAMPANA ---
repaint_delay 10
input_delay 3
sync_to_monitor yes
enable_audio_bell no

# --- TEMA ---
include current-theme.conf
